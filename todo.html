<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>
    <main class="appShell">
      <section class="todoApp" aria-labelledby="app-title">
        <h1 id="app-title">Todo List App</h1>

        <form class="todoInputGrid todoForm">
          <input
            type="text"
            placeholder="Task name"
            class="inputJs inputCss"
            aria-label="Task name"
            autocomplete="off"
          >

          <input type="date" class="dateJs dateCss" aria-label="Due date">

          <button type="submit" class="addJs addCss">Add</button>
        </form>

        <div class="todoListJs todoGrid" aria-live="polite"></div>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
